<h1 id="ai-%EB%B0%9C%EC%A0%84-%ED%9D%90%EB%A6%84">AI 발전 흐름</h1>
<ol>
<li>규칙 기반 AI <small>사람이 미리 작성한 규칙대로만 동작하는 AI</small></li>
<li>머신러닝 <small>데이터를 학습하여 스스로 규칙을 찾아 예측하는 AI</small></li>
<li>딥러닝 <small>인공신경망을 이용해 복잡한 패턴까지 스스로 학습하는 AI</small></li>
<li>생성형 AI <small>학습한 내용을 바탕으로 새로운 텍스트, 이미지, 코드 등을 생성하는 AI</small></li>
<li>AI Assistant <small>사용자의 질문에 답하고 작업을 도와주는 대화형 AI</small></li>
<li><strong>AI Agent</strong> <small>목표를 이해하고 계획을 세워 여러 작업을 스스로 수행하는 AI</small></li>
</ol>
</section>

<h1 id="llm-%EC%9D%B4%EB%9E%80">LLM 이란?</h1>
<p>LLM은 Large Language Model, 대규모 언어 모델입니다.<br />
쉽게 말하면 엄청나게 많은 텍스트를 학습해서, <strong>다음에 올 말을 예측</strong>하는 AI 모델입니다.</p>
<p>&quot;오늘 날씨가 참&quot; 다음에 주로 오는 말로는<br />
&quot;좋다. 춥다. 맑다. 덥다&quot; 같은 단어가 나올 확율이 높습니다.</p>
<p>LLM은 이 과정을 아주 빠르게 반복해서 긴 문장, 설명, 코드, 요약, 번역 등을 만들어냅니다.</p>

아니라면 이후 관리를 위해 문서는 모아 두는 것이 좋습니다.</p>
<p>문서가 많아지면 세부 폴더를 만들어 정리해달라고 요청하시면 됩니다.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>확정된 방향:
- 서버 없음 - 브라우저 IndexedDB에만 저장, 오프라인/PWA
- 마스터 비밀번호로 잠금, 비밀번호 항목은 AES-GCM 암호화
- 유효기간 만료 임박 시 앱 내 색상 배지로 표시
- 5가지 항목 타입: 비밀번호, 유효기간, 주소, 메모, 할일
</code></pre>
</section>

<h1 id="%EC%84%A4%EA%B3%84-%EB%AC%B8%EC%84%9C-%EC%9E%91%EC%84%B1">설계 문서 작성</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>당신은 웹앱 서비스 설계자이며, 시니어 프론트엔드/보안 아키텍트다.
먼저 제공한 문서를 읽고, 바로 설계를 진행하지 말고 부족한 정보를 
질문하면서 설계를 구체화해라.

잔행 방식
1. 요구사항문서 (docs\REQUIREMENTS.md) 분석하라.
2. 요구사항 내 불명확한 정보 확인하라.
4. 불명확한 내용은 단계별로 질문하고, 선택지를 제공해라.
5. 답변을 반영해 설계 방향을 확정한다.
6. 모든 의사 결정이 끝나면 최종 설계 문서를 작성하라.
7. 모듈 별로 개발 진행되도록 단계를 구분하라.
</code></pre>
<p>참, 프롬프트는 두괄식이 좋다합니다.</p>
</section>
